name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned (rather than `latest`) so new linter releases can't silently
          # break CI by enabling new analyzers. Bump intentionally.
          version: v2.12.0

      - name: Build
        run: go build -v ./...

      - name: Check generated code is up to date
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          ./scripts/generate.sh
          if [ -n "$(git status --porcelain internal/api/client.gen.go)" ]; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the changes."
            git diff internal/api/client.gen.go
            exit 1
          fi

      - name: Test
        run: go test -v -race -short -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  skill-add:
    # End-to-end check that `notte skill add` actually installs the skill from
    # the nottelabs/notte-skills repo. Catches regressions where the npx
    # source URL or skill name drifts and the tool reports "No skills found".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build CLI
        run: go build -o notte ./cmd/notte

      - name: notte skill add
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cp notte "$workdir/notte"
          cd "$workdir"
          # --yes skips the interactive agent picker (no TTY in CI).
          ./notte --yes skill add
          if [ ! -f .agents/skills/notte-browser/SKILL.md ]; then
            echo "::error::notte skill add did not install notte-browser/SKILL.md"
            ls -laR .agents || true
            exit 1
          fi

      - name: notte skill add --upgrade (re-runs against installed skill)
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cp notte "$workdir/notte"
          cd "$workdir"
          ./notte --yes skill add
          ./notte --yes skill add --upgrade
          if [ ! -f .agents/skills/notte-browser/SKILL.md ]; then
            echo "::error::notte skill add --upgrade did not leave notte-browser/SKILL.md installed"
            exit 1
          fi
